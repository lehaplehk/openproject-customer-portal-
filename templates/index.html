{% extends "base.html" %}

{% block content %}
<link href="{{ url_for('static', filename='css/main.css') }}" rel="stylesheet">

<div class="min-vh-100 d-flex align-items-center">

  <div class="container text-center">
    <div class="row justify-content-center">
        
      <div class="col-auto p-3 border">
        <div class="d-flex justify-content-around">
            <img src="/static/img/openproject.svg" style="width: 150px;">
            <div style="min-width: 500px;">
                <div class="text-start">
                  <div>Help center</div>
                  <h4>OKBTSP Help Desk</h4> 
                  <p class="fw-lighter font10">Welcome to the portal, here you can create a task or ask technical support</p>
                </div>
                
            </div>
        </div>
        <div>
          <div class="input-group mb-3 w-100">
            <span onclick="OnSearchFile()" class="input-group-text panel" id="basic-addon1"><i class="bi bi-search"></i></span>
            <input id="input-search-file" onkeydown="if (event.keyCode === 13) {OnSearchFile()}" type="text" class="form-control panel" placeholder="Ask a question you are interested in"  aria-describedby="basic-addon1">
          </div>
          <div class="d-flex justify-content-between">
            <div class="text-start">
              <div class="mb-2 fs-5">Common Requests</div>
              <div class="mb-2">Tehnical support</div>  
              <div class="mb-2">Tehnical support2</div>     
              <div class="mb-2">Tehnical support3</div>     
              <div class="mb-2">Tehnical support4</div>              
            </div>
            <div class="vr"></div>
            <div class="w-50">
              <div class="d-flex justify-content-start fs-5">
                <i class="bi bi-archive-fill"></i>
                <div class="ms-2">Test</div>
              </div>
              <div class="d-flex justify-content-start fs-5">
                <i class="bi bi-hdd-network-fill"></i>
                <div class="ms-2">Network question</div>
              </div>
              <div class="d-flex justify-content-start fs-5">
                <i class="bi bi-wifi"></i>
                <div class="ms-2">WiFi question</div>
              </div>
              
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>


{% endblock %}
